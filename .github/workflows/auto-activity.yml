name: Desarrollo de Proyecto 365

on:
  schedule:
    # Horarios variados para simular comportamiento orgánico
    - cron: '15 8 * * 1'   # Lunes 8:15 UTC
    - cron: '42 14 * * 2'  # Martes 14:42 UTC  
    - cron: '5 11 * * 3'   # Miércoles 11:05 UTC
    - cron: '33 9 * * 4'   # Jueves 9:33 UTC
    - cron: '50 16 * * 5'  # Viernes 16:50 UTC
  workflow_dispatch: {}

permissions:
  id-token: write   # Necesario para el login con OIDC en Azure
  contents: write   # Necesario para hacer commit del activity.log

jobs:
  activity:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: 1. Checkout del repositorio
        uses: actions/checkout@v7

      - name: 2. Configurar variables dinámicas y selección aleatoria
        id: set_vars
        run: |
          UNIQUE_SUFFIX=$(date +%Y%m%d-%H%M%S)
          echo "UNIQUE_SUFFIX=${UNIQUE_SUFFIX}" >> $GITHUB_OUTPUT
          echo "SHAREPOINT_FILE_NAME=actividad-log-${UNIQUE_SUFFIX}.txt" >> $GITHUB_OUTPUT
          echo "OUTLOOK_START_TIME=$(date -u -d '+1 hour' --iso-8601=seconds)" >> $GITHUB_OUTPUT
          echo "OUTLOOK_END_TIME=$(date -u -d '+1 hour 5 minutes' --iso-8601=seconds)" >> $GITHUB_OUTPUT
          
          # Selección aleatoria de actividades para simular comportamiento orgánico
          # Cada ejecución realizará un subconjunto diferente de actividades
          DAY_OF_WEEK=$(date +%u)  # 1=Lunes, 5=Viernes
          RANDOM_SEED=$(($(date +%s) % 100))
          
          # Actividades base (siempre se ejecutan)
          echo "RUN_CORE=true" >> $GITHUB_OUTPUT
          
          # Actividades opcionales basadas en día y aleatoriedad
          [[ $DAY_OF_WEEK -eq 1 || $RANDOM_SEED -lt 40 ]] && echo "RUN_EXCEL=true" >> $GITHUB_OUTPUT || echo "RUN_EXCEL=false" >> $GITHUB_OUTPUT
          [[ $DAY_OF_WEEK -eq 3 || $RANDOM_SEED -lt 50 ]] && echo "RUN_ONENOTE=true" >> $GITHUB_OUTPUT || echo "RUN_ONENOTE=false" >> $GITHUB_OUTPUT
          [[ $DAY_OF_WEEK -eq 5 || $RANDOM_SEED -lt 30 ]] && echo "RUN_FORMS=true" >> $GITHUB_OUTPUT || echo "RUN_FORMS=false" >> $GITHUB_OUTPUT
          [[ $RANDOM_SEED -lt 60 ]] && echo "RUN_PLANNER_EXTRA=true" >> $GITHUB_OUTPUT || echo "RUN_PLANNER_EXTRA=false" >> $GITHUB_OUTPUT
          [[ $DAY_OF_WEEK -le 3 ]] && echo "RUN_DAILY_STANDUPS=true" >> $GITHUB_OUTPUT || echo "RUN_DAILY_STANDUPS=false" >> $GITHUB_OUTPUT
          
          echo "🎲 Configuración aleatoria: Día=$DAY_OF_WEEK, Seed=$RANDOM_SEED"

      - name: 3. Registrar inicio de actividad local
        run: |
          echo "Inicio de actividad de desarrollo: $(date)" >> activity.log

      - name: 4. Login con Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: 5. Obtener token de acceso para Microsoft Graph
        id: get_token
        run: |
          TOKEN=$(az account get-access-token --resource https://graph.microsoft.com --query accessToken -o tsv)
          echo "TOKEN=$TOKEN" >> $GITHUB_OUTPUT
          echo "::add-mask::$TOKEN" # Mascarar el token en los logs
          echo "Token de acceso para Graph obtenido exitosamente."



      - name: 6. Asegurar que el canal de logs existe y es utilizable
        id: setup_channel
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          TEAM_ID: ${{ secrets.MS_TEAMS_TEAM_ID }}
          CHANNEL_NAME: "GitHub-Activity-Log" # O el nuevo nombre que elijas
        run: |
          CLEAN_TEAM_ID=$(echo -n "$TEAM_ID" | tr -d '[:cntrl:]')
          echo "Buscando canales en el equipo..."
          ALL_CHANNELS_JSON=$(curl -s -f -X GET "https://graph.microsoft.com/v1.0/teams/$CLEAN_TEAM_ID/channels" -H "Authorization: Bearer $TOKEN")
          if [ $? -ne 0 ]; then
            echo "❌ Error al obtener la lista de canales. Verifica permisos y el TEAM_ID."
            exit 1
          fi

          CHANNEL_ID=$(echo "$ALL_CHANNELS_JSON" | jq -r --arg chanName "$CHANNEL_NAME" '.value[]? | select(.displayName == $chanName) | .id')

          if [ -n "$CHANNEL_ID" ] && [ "$CHANNEL_ID" != "null" ]; then
            echo "✅ Canal '$CHANNEL_NAME' ya existía."
          else
            echo "Canal '$CHANNEL_NAME' no encontrado. Intentando crear..."
            JSON_BODY=$(jq -n --arg channelName "$CHANNEL_NAME" '{displayName: $channelName, description: "Canal para logs de GitHub Actions"}')
            CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://graph.microsoft.com/v1.0/teams/$CLEAN_TEAM_ID/channels" -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d "$JSON_BODY")
            CREATE_HTTP_CODE=$(echo "$CREATE_RESPONSE" | tail -n1)
            NEW_CHANNEL_JSON=$(echo "$CREATE_RESPONSE" | sed '$d')

            if [ "$CREATE_HTTP_CODE" = "201" ]; then
              CHANNEL_ID=$(echo "$NEW_CHANNEL_JSON" | jq -r '.id')
              echo "✅ Canal creado exitosamente: $CHANNEL_ID"
              echo "Completando migración del canal..."
              MIGRATE_RESPONSE=$(curl -s -w "%{http_code}" -X POST "https://graph.microsoft.com/v1.0/teams/$CLEAN_TEAM_ID/channels/$CHANNEL_ID/completeMigration" -H "Authorization: Bearer $TOKEN" -H "Content-Length: 0")
              if [ "$MIGRATE_RESPONSE" = "204" ]; then
                echo "✅ Migración de canal completada."
              else
                echo "ℹ️  No se pudo completar la migración (código $MIGRATE_RESPONSE). Es seguro continuar."
              fi
            else
              ERROR_CODE=$(echo "$NEW_CHANNEL_JSON" | jq -r '.error.innerError.code // .error.code')
              if [ "$ERROR_CODE" = "NameAlreadyExists" ]; then
                echo "⚠️ ERROR DETECTADO: El nombre de canal '$CHANNEL_NAME' está en estado 'soft-deleted'."
                echo "Intentando usar el canal 'General' como fallback..."
                CHANNEL_ID=$(echo "$ALL_CHANNELS_JSON" | jq -r '.value[]? | select(.displayName == "General") | .id')
                if [ -z "$CHANNEL_ID" ] || [ "$CHANNEL_ID" = "null" ]; then
                   echo "❌ Fallback fallido: No se pudo encontrar el canal 'General'."
                   exit 1
                fi
                echo "✅ Usando canal 'General' como fallback."
              else
                echo "❌ Error fatal e inesperado al crear el canal. Código: $CREATE_HTTP_CODE"
                echo "$NEW_CHANNEL_JSON"
                exit 1
              fi
            fi
          fi

      - name: 7. Enviar Mensaje a Teams vía Webhook
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
        run: |
          echo "Enviando mensaje a Teams vía Webhook..."

          # Construir el cuerpo JSON de forma segura usando jq
          # Se han eliminado los comentarios intermedios y las continuaciones de línea innecesarias para mayor robustez.
          JSON_BODY=$(jq -n \
                        --arg suffix "$UNIQUE_SUFFIX" \
                        --arg repo "${{ github.repository }}" \
                        --arg date_utc "$(date -u --iso-8601=seconds)" \
                        '{
                          "@type": "MessageCard",
                          "@context": "http://schema.org/extensions",
                          "themeColor": "0076D7",
                          "summary": "Actividad de Desarrollo E5",
                          "sections": [{
                            "activityTitle": "🤖 <b>Actividad de desarrollo completada</b>",
                            "activitySubtitle": "Ejecutado desde GitHub Actions",
                            "facts": [{
                              "name": "Sufijo de ejecución",
                              "value": $suffix
                            }, {
                              "name": "Repositorio",
                              "value": $repo
                            }, {
                              "name": "Fecha (UTC)",
                              "value": $date_utc
                            }],
                            "markdown": true
                          }]
                        }')
          
          # Paso de depuración: Imprime el JSON que se va a enviar
          echo "JSON Payload a enviar:"
          echo "$JSON_BODY"

          # Enviar la petición a Teams
          RESPONSE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$JSON_BODY" \
            "${{ secrets.TEAMS_WEBHOOK_URL }}")

          if [ "$RESPONSE_CODE" -eq 200 ]; then
            echo "✅ Mensaje enviado exitosamente a Teams."
          else
            echo "❌ Error al enviar mensaje a Teams vía Webhook. Código de respuesta: $RESPONSE_CODE"
          fi



      - name: 8. Subir archivo a SharePoint
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          SHAREPOINT_SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
          SHAREPOINT_FILE_NAME: ${{ steps.set_vars.outputs.SHAREPOINT_FILE_NAME }}
        run: |
          echo "Contenido generado automáticamente el $(date)" > temp_file.txt
          RESPONSE=$(curl -s -w "\n%{http_code}" -X PUT "https://graph.microsoft.com/v1.0/sites/$SHAREPOINT_SITE_ID/drive/root:/$SHAREPOINT_FILE_NAME:/content" -H "Authorization: Bearer $TOKEN" -T temp_file.txt)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          if [ "$HTTP_CODE" -ne 200 ] && [ "$HTTP_CODE" -ne 201 ]; then echo "Error al subir a SharePoint: $(echo "$RESPONSE" | sed '$d')" && exit 1; fi
          echo "✅ Archivo '$SHAREPOINT_FILE_NAME' subido a SharePoint."
          rm temp_file.txt

      - name: 9. Ejecutar Flow en Power Automate
        env:
          POWER_AUTOMATE_HTTP_TRIGGER_URL: ${{ secrets.POWER_AUTOMATE_HTTP_TRIGGER_URL }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$POWER_AUTOMATE_HTTP_TRIGGER_URL" -H "Content-Type: application/json" -d "{\"source\":\"GitHub Actions E5\",\"suffix\":\"$UNIQUE_SUFFIX\"}")
          if [ "$HTTP_CODE" -ne 202 ]; then echo "Error al ejecutar Flow. Código: $HTTP_CODE" && exit 1; fi
          echo "✅ Flow en Power Automate ejecutado exitosamente."

      - name: 10. Crear evento en Calendario de Outlook
        id: create_calendar_event
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          USER_EMAIL: ${{ secrets.MS_GRAPH_USER_EMAIL }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
          START_TIME: ${{ steps.set_vars.outputs.OUTLOOK_START_TIME }}
          END_TIME: ${{ steps.set_vars.outputs.OUTLOOK_END_TIME }}
        run: |
          JSON_BODY=$(jq -n --arg subject "Actividad E5 - $UNIQUE_SUFFIX" --arg content "<p>Evento generado por GitHub Actions.</p>" --arg startTime "$START_TIME" --arg endTime "$END_TIME" '{subject: $subject, body: {contentType: "HTML", content: $content}, start: {dateTime: $startTime, timeZone: "UTC"}, end: {dateTime: $endTime, timeZone: "UTC"}}')
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://graph.microsoft.com/v1.0/users/$USER_EMAIL/calendar/events" -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d "$JSON_BODY")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          if [ "$HTTP_CODE" -ne 201 ]; then echo "Error al crear evento. Código: $HTTP_CODE, Respuesta: $BODY" && exit 1; fi
          EVENT_ID=$(echo "$BODY" | jq -r '.id')
          echo "✅ Evento de calendario creado. ID: $EVENT_ID"
          echo "OUTLOOK_EVENT_ID=$EVENT_ID" >> $GITHUB_OUTPUT

      - name: 11. Ciclo CRUD en OneDrive para Actividad de API
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          USER_EMAIL: ${{ secrets.MS_GRAPH_USER_EMAIL }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
        run: |
          # Opciones de shell para depuración y seguridad
          # set -e: Salir inmediatamente si un comando falla.
          # set -x: Imprimir cada comando antes de ejecutarlo (excelente para logs).
          set -ex

          FILE_NAME="actividad-e5-${UNIQUE_SUFFIX}.txt"
          FILE_PATH_URL="https://graph.microsoft.com/v1.0/users/$USER_EMAIL/drive/root:/GitHub-Actions-Logs/$FILE_NAME"
          
          # --- 1. CREAR (Create) ---
          echo "✅ 1. Creando archivo en OneDrive..."
          CONTENT_V1="Reporte de Actividad E5\nFecha de creación: $(date)"
          CREATE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT "$FILE_PATH_URL:/content" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: text/plain" \
            --data-raw "$CONTENT_V1")
          
          CREATE_HTTP_CODE=$(echo "$CREATE_RESPONSE" | tail -n1)
          CREATE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')

          if [ "$CREATE_HTTP_CODE" -ne 201 ] && [ "$CREATE_HTTP_CODE" -ne 200 ]; then
            echo "❌ Error al crear el archivo. Código: $CREATE_HTTP_CODE"
            echo "$CREATE_BODY"
            exit 1
          fi
          
          # Extraer el ID del archivo creado para los siguientes pasos
          FILE_ID=$(echo "$CREATE_BODY" | jq -r '.id')
          echo "Archivo creado con éxito. ID: $FILE_ID"

          # Pequeña pausa para asegurar que el archivo esté listo para las siguientes operaciones
          sleep 5

          # --- 2. LEER (Read) ---
          echo "✅ 2. Leyendo el contenido del archivo..."
          READ_CONTENT=$(curl -s -f -L \
            -H "Authorization: Bearer $TOKEN" \
            "https://graph.microsoft.com/v1.0/users/$USER_EMAIL/drive/items/$FILE_ID/content")
          
          if [ $? -ne 0 ]; then
            echo "❌ Error al leer el contenido del archivo."
            # Aún así, intentaremos borrarlo en el paso final
          else
            echo "Contenido leído exitosamente: $READ_CONTENT"
          fi

          # --- 3. ACTUALIZAR (Update) ---
          echo "✅ 3. Actualizando el contenido del archivo..."
          CONTENT_V2="$READ_CONTENT\nContenido actualizado: $(date)"
          UPDATE_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PUT "$FILE_PATH_URL:/content" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: text/plain" \
            --data-raw "$CONTENT_V2")

          UPDATE_HTTP_CODE=$(echo "$UPDATE_RESPONSE" | tail -n1)
          if [ "$UPDATE_HTTP_CODE" -ne 201 ] && [ "$UPDATE_HTTP_CODE" -ne 200 ]; then
            echo "❌ Error al actualizar el archivo. Código: $UPDATE_HTTP_CODE"
            echo "$(echo "$UPDATE_RESPONSE" | sed '$d')"
          else
            echo "Archivo actualizado exitosamente."
          fi

          sleep 5

          # --- 4. BORRAR (Delete) ---
          # Se ejecuta siempre para limpiar, incluso si un paso intermedio falló
          if [ -n "$FILE_ID" ]; then
            echo "✅ 4. Limpiando (borrando) el archivo creado..."
            DELETE_HTTP_CODE=$(curl -s -w "%{http_code}" -o /dev/null \
              -X DELETE \
              -H "Authorization: Bearer $TOKEN" \
              "https://graph.microsoft.com/v1.0/users/$USER_EMAIL/drive/items/$FILE_ID")

            if [ "$DELETE_HTTP_CODE" -ne 204 ]; then
              echo "⚠️ No se pudo eliminar el archivo (Código: $DELETE_HTTP_CODE). Puede que necesites borrarlo manualmente."
            else
              echo "Archivo borrado exitosamente."
            fi
          fi

          echo "🎉 Ciclo CRUD en OneDrive completado."

      - name: 12. Enviar correo con resumen
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          USER_EMAIL: ${{ secrets.MS_GRAPH_USER_EMAIL }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
        run: |
          EMAIL_BODY="Se han completado las actividades para $UNIQUE_SUFFIX.\n- Actualización de Perfil\n- Archivo SharePoint\n- Evento Calendario\n- Documento OneDrive"
          JSON_BODY=$(jq -n --arg to "$USER_EMAIL" --arg subject "Resumen Actividad E5 - $UNIQUE_SUFFIX" --arg content "$EMAIL_BODY" '{message: {subject: $subject, body: {contentType: "Text", content: $content}, toRecipients: [{emailAddress: {address: $to}}]}}')
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://graph.microsoft.com/v1.0/users/$USER_EMAIL/sendMail" -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" -d "$JSON_BODY")
          if [ "$(echo "$RESPONSE" | tail -n1)" -ne 202 ]; then echo "Error al enviar correo: $(echo "$RESPONSE" | sed '$d')" && exit 1; fi
          echo "✅ Correo de resumen enviado exitosamente."

      - name: 13. Obtener o Crear Proyecto de Desarrollo (Reutilizable)
        id: power_platform_activity
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
          PROJECT_NAME: "E5-Dev-Project"
        run: |
          echo "🔍 Iniciando actividad de desarrollo en Power Platform (via Microsoft Graph)..."
          
          # --- 1. BUSCAR Grupo de Proyecto existente ---
          echo "📋 Paso 1: Buscando grupo de proyecto existente..."
          # Usar curl -G con --data-urlencode para queries OData
          EXISTING_GROUP=$(curl -s -G \
            "https://graph.microsoft.com/v1.0/groups" \
            --data-urlencode "\$filter=displayName eq '$PROJECT_NAME'" \
            --data-urlencode "\$select=id,displayName,createdDateTime" \
            -H "Authorization: Bearer $TOKEN")
          
          GROUP_ID=$(echo "$EXISTING_GROUP" | jq -r '.value[0].id // empty')
          GROUP_CREATED="false"
          
          if [ -n "$GROUP_ID" ] && [ "$GROUP_ID" != "null" ]; then
            echo "✅ Grupo existente encontrado: $GROUP_ID"
            echo "GROUP_ID=$GROUP_ID" >> $GITHUB_OUTPUT
            echo "GROUP_CREATED=false" >> $GITHUB_OUTPUT
            
            # Actualizar descripción para registrar actividad
            UPDATE_JSON=$(jq -n \
              --arg desc "Proyecto desarrollo Power Platform E5 - Última actividad: $UNIQUE_SUFFIX" \
              '{"description": $desc}')
            
            curl -s -o /dev/null \
              -X PATCH "https://graph.microsoft.com/v1.0/groups/$GROUP_ID" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$UPDATE_JSON"
            echo "✅ Descripción del grupo actualizada con timestamp"
            
          else
            echo "📋 No existe grupo, creando nuevo..."
            GROUP_JSON=$(jq -n \
              --arg name "$PROJECT_NAME" \
              --arg desc "Proyecto desarrollo Power Platform E5 - Creado: $UNIQUE_SUFFIX" \
              --arg mail "e5-dev-project" \
              '{
                "displayName": $name,
                "description": $desc,
                "groupTypes": ["Unified"],
                "mailEnabled": true,
                "mailNickname": $mail,
                "securityEnabled": false
              }')
            
            CREATE_GROUP=$(curl -s -w "\n%{http_code}" \
              -X POST "https://graph.microsoft.com/v1.0/groups" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$GROUP_JSON")
            
            HTTP_CODE=$(echo "$CREATE_GROUP" | tail -n1)
            BODY=$(echo "$CREATE_GROUP" | sed '$d')
            
            if [ "$HTTP_CODE" -eq 201 ]; then
              GROUP_ID=$(echo "$BODY" | jq -r '.id')
              echo "✅ Grupo creado: $GROUP_ID"
              echo "GROUP_ID=$GROUP_ID" >> $GITHUB_OUTPUT
              echo "GROUP_CREATED=true" >> $GITHUB_OUTPUT
              GROUP_CREATED="true"
            else
              echo "⚠️ No se pudo crear el grupo (Código: $HTTP_CODE)"
              echo "Respuesta: $BODY"
              exit 1
            fi
          fi
          
          # --- 2. Obtener o Crear Plan en Planner ---
          echo "📋 Paso 2: Buscando plan de proyecto existente..."
          EXISTING_PLANS=$(curl -s \
            -X GET "https://graph.microsoft.com/v1.0/groups/$GROUP_ID/planner/plans" \
            -H "Authorization: Bearer $TOKEN")
          
          PLAN_ID=$(echo "$EXISTING_PLANS" | jq -r '.value[0].id // empty')
          
          if [ -n "$PLAN_ID" ] && [ "$PLAN_ID" != "null" ]; then
            echo "✅ Plan existente encontrado: $PLAN_ID"
          else
            echo "Creando nuevo plan..."
            PLAN_JSON=$(jq -n \
              --arg title "Desarrollo Apps E5" \
              --arg owner "$GROUP_ID" \
              '{
                "container": {
                  "containerId": $owner,
                  "type": "group"
                },
                "title": $title
              }')
            
            CREATE_PLAN=$(curl -s -w "\n%{http_code}" \
              -X POST "https://graph.microsoft.com/v1.0/planner/plans" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PLAN_JSON")
            
            if [ "$(echo "$CREATE_PLAN" | tail -n1)" -eq 201 ]; then
              PLAN_ID=$(echo "$CREATE_PLAN" | sed '$d' | jq -r '.id')
              echo "✅ Plan creado: $PLAN_ID"
            fi
          fi
          
          # --- 3. Agregar UNA tarea nueva (actividad incremental) ---
          if [ -n "$PLAN_ID" ]; then
            echo "📋 Paso 3: Agregando tarea de desarrollo..."
            
            # Generar tarea con fecha para no duplicar
            TASK_TITLE="Sprint $(date +%V) - Tarea $UNIQUE_SUFFIX"
            
            TASK_JSON=$(jq -n \
              --arg title "$TASK_TITLE" \
              --arg planId "$PLAN_ID" \
              '{
                "planId": $planId,
                "title": $title
              }')
            
            curl -s -o /dev/null \
              -X POST "https://graph.microsoft.com/v1.0/planner/tasks" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$TASK_JSON"
            echo "✅ Tarea agregada: $TASK_TITLE"
          fi
          
          # --- 4. Crear Team y Canal de Desarrollo (solo si es nuevo) ---
          if [ "$GROUP_CREATED" = "true" ]; then
            echo "📋 Paso 4: Configurando equipo de desarrollo..."
            TEAM_JSON='{
              "memberSettings": {
                "allowCreateUpdateChannels": true,
                "allowDeleteChannels": true
              },
              "messagingSettings": {
                "allowUserEditMessages": true,
                "allowUserDeleteMessages": true
              },
              "funSettings": {
                "allowGiphy": true,
                "giphyContentRating": "strict"
              }
            }'
            
            CREATE_TEAM=$(curl -s -o /dev/null -w "%{http_code}" \
              -X PUT "https://graph.microsoft.com/v1.0/groups/$GROUP_ID/team" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$TEAM_JSON")
            
            if [ "$CREATE_TEAM" -eq 201 ] || [ "$CREATE_TEAM" -eq 200 ]; then
              echo "✅ Team creado, agregando canal de desarrollo..."
              sleep 5
              
              CHANNEL_JSON=$(jq -n \
                --arg name "Dev Power Platform" \
                '{
                  "displayName": $name,
                  "description": "Canal para actividades de desarrollo Power Platform",
                  "membershipType": "standard"
                }')
              
              curl -s -o /dev/null \
                -X POST "https://graph.microsoft.com/v1.0/teams/$GROUP_ID/channels" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "$CHANNEL_JSON"
              echo "✅ Canal de desarrollo creado"
            fi
          fi
          
          # --- 5. Subir documentación técnica a SharePoint (actividad de documentación) ---
          echo "📋 Paso 5: Subiendo documentación de desarrollo..."
          DRIVE_INFO=$(curl -s \
            -X GET "https://graph.microsoft.com/v1.0/groups/$GROUP_ID/drive" \
            -H "Authorization: Bearer $TOKEN")
          
          DRIVE_ID=$(echo "$DRIVE_INFO" | jq -r '.id')
          if [ "$DRIVE_ID" != "null" ] && [ -n "$DRIVE_ID" ]; then
            echo "Especificación técnica - Componente Power Apps
            Fecha: $(date)
            Desarrollador: GitHub Actions E5
            Version: $UNIQUE_SUFFIX
            Tipo: Canvas App
            Conectores: SharePoint, Office 365, Dataverse" > /tmp/spec.txt
            
            curl -s -o /dev/null \
              -X PUT "https://graph.microsoft.com/v1.0/drives/$DRIVE_ID/root:/espec-powerapp-$UNIQUE_SUFFIX.txt:/content" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: text/plain" \
              --upload-file /tmp/spec.txt
            echo "✅ Documentación técnica subida a SharePoint"
          fi
          
          # --- 6. Crear evento de sprint planning (usa Calendars.ReadWrite) ---
          echo "📋 Paso 6: Creando evento de sprint planning..."
          START_TIME=$(date -u -d '+2 hours' --iso-8601=seconds)
          END_TIME=$(date -u -d '+3 hours' --iso-8601=seconds)
          
          EVENT_JSON=$(jq -n \
            --arg subject "Sprint Review: Power Platform Development $UNIQUE_SUFFIX" \
              --arg start "$START_TIME" \
              --arg end "$END_TIME" \
              '{
                "subject": $subject,
                "body": {
                  "contentType": "HTML",
                  "content": "<h3>Sprint Review - Proyecto Power Platform</h3><p>Revisión de avances en desarrollo de aplicaciones y automatizaciones.</p><ul><li>Canvas Apps</li><li>Power Automate</li><li>Dataverse</li></ul>"
                },
                "start": {
                  "dateTime": $start,
                  "timeZone": "UTC"
                },
                "end": {
                  "dateTime": $end,
                  "timeZone": "UTC"
                },
                "attendees": [],
                "isOnlineMeeting": true,
                "onlineMeetingProvider": "teamsForBusiness"
              }')
          
          curl -s -o /dev/null \
            -X POST "https://graph.microsoft.com/v1.0/users/${{ secrets.MS_GRAPH_USER_EMAIL }}/calendar/events" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$EVENT_JSON"
          echo "✅ Evento de sprint creado"
          
          echo ""
          echo "🎉 Resumen Actividad Power Platform:"
          echo "   ✅ Grupo de proyecto reutilizado o creado"
          echo "   ✅ Plan de desarrollo en Planner"
          echo "   ✅ Tarea de desarrollo agregada"
          echo "   ✅ Team y canal de desarrollo (si es nuevo)"
          echo "   ✅ Documentación técnica en SharePoint"
          echo "   ✅ Evento de sprint en calendario"
          echo "   📝 Sufijo: $UNIQUE_SUFFIX"
          echo ""
          echo "✅ Actividad de desarrollo completada exitosamente"

      - name: 13a. Actividad en Excel Online (Hoja de Cálculo)
        if: steps.set_vars.outputs.RUN_EXCEL == 'true'
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
          USER_EMAIL: ${{ secrets.MS_GRAPH_USER_EMAIL }}
        run: |
          echo "📊 Creando actividad en Excel Online..."
          
          BASE_URL="https://graph.microsoft.com/v1.0/users/$USER_EMAIL/drive"
          
          # Crear carpeta E5-Dev-Docs si no existe
          curl -s -o /dev/null -X POST "$BASE_URL/root/children" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name": "E5-Dev-Docs", "folder": {}, "@microsoft.graph.conflictBehavior": "fail"}' || true
          
          # Crear archivo Excel vacío
          CREATE_EXCEL=$(curl -s -w "\n%{http_code}" \
            -X PUT "$BASE_URL/root:/E5-Dev-Docs/Sprint-Metrics-$UNIQUE_SUFFIX.xlsx:/content" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" \
            --data-binary "")
          
          HTTP_CODE=$(echo "$CREATE_EXCEL" | tail -n1)
          
          if [ "$HTTP_CODE" -eq 201 ] || [ "$HTTP_CODE" -eq 200 ]; then
            ITEM_ID=$(echo "$CREATE_EXCEL" | sed '$d' | jq -r '.id')
            echo "✅ Archivo Excel creado: Sprint-Metrics-$UNIQUE_SUFFIX.xlsx"
            
            # Crear sesión de workbook para editar
            SESSION=$(curl -s \
              -X POST "$BASE_URL/items/$ITEM_ID/workbook/createSession" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"persistChanges": true}')
            
            SESSION_ID=$(echo "$SESSION" | jq -r '.id // empty')
            
            if [ -n "$SESSION_ID" ]; then
              # Agregar datos de métricas de sprint
              RANGE_DATA='{"values": [["Sprint", "Velocidad", "Bugs", "Features", "Fecha"],["Sprint 1", 42, 3, 8, "'$(date +%Y-%m-%d)'"],["Sprint 2", 38, 5, 6, "'$(date -d '+14 days' +%Y-%m-%d)'"],["Sprint 3", 45, 2, 10, "'$(date -d '+28 days' +%Y-%m-%d)'"]]}'
              
              curl -s -o /dev/null \
                -X PATCH "$BASE_URL/items/$ITEM_ID/workbook/worksheets/Sheet1/range(address='A1:E4')" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -H "workbook-session-id: $SESSION_ID" \
                -d "$RANGE_DATA"
              
              # Cerrar sesión
              curl -s -o /dev/null \
                -X POST "$BASE_URL/items/$ITEM_ID/workbook/closeSession" \
                -H "Authorization: Bearer $TOKEN" \
                -H "workbook-session-id: $SESSION_ID"
              
              echo "✅ Datos de métricas de sprint agregados a Excel"
            fi
          else
            echo "⚠️ No se pudo crear Excel (código: $HTTP_CODE)"
          fi

      # NOTA: OneNote API ya no soporta tokens de aplicación desde marzo 2025
      # Ver: https://learn.microsoft.com/en-us/graph/auth-v2-user

      - name: 13b. Actividad en Microsoft Forms (Encuesta)
        if: steps.set_vars.outputs.RUN_FORMS == 'true'
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
          USER_EMAIL: ${{ secrets.MS_GRAPH_USER_EMAIL }}
        run: |
          echo "📝 Creando actividad en Microsoft Forms..."
          
          BASE_URL="https://graph.microsoft.com/v1.0/users/$USER_EMAIL/drive"
          
          # Crear carpeta Forms si no existe
          curl -s -o /dev/null -X POST "$BASE_URL/root/children" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name": "Forms", "folder": {}, "@microsoft.graph.conflictBehavior": "fail"}' || true
          
          # Crear documento de feedback (contenido en una línea para evitar problemas YAML)
          echo -e "# Sprint Feedback Form - $UNIQUE_SUFFIX\n\n## Preguntas\n1. Productividad (1-5)\n2. Que funciono bien?\n3. Que mejorar?\n\n## Respuestas\nFecha: $(date)\nSprint: $UNIQUE_SUFFIX\n\n---\nGenerado por GitHub Actions E5" > /tmp/feedback.md
          
          curl -s -o /dev/null -X PUT "$BASE_URL/root:/Forms/Sprint-Feedback-$UNIQUE_SUFFIX.md:/content" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: text/markdown" \
            --upload-file /tmp/feedback.md
          
          rm -f /tmp/feedback.md
          echo "✅ Documento de feedback creado"

      - name: 14. Limpieza Selectiva de Recursos Efímeros
        if: always()
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
        run: |
          echo "🧹 Limpieza selectiva de recursos efímeros (conservando proyecto principal)..."
          
          # 1. Limpiar eventos de calendario antiguos (>30 días) con nuestro patrón
          # Conservamos más historial para demostrar actividad continua
          echo "📅 Limpiando eventos de calendario antiguos (>30 días)..."
          CUTOFF_DATE=$(date -u -d '-30 days' +%Y-%m-%dT00:00:00Z)
          USER_EMAIL="${{ secrets.MS_GRAPH_USER_EMAIL }}"
          
          # Usar -G y --data-urlencode para queries OData complejas
          OLD_EVENTS=$(curl -s -G \
            "https://graph.microsoft.com/v1.0/users/${USER_EMAIL}/calendar/events" \
            --data-urlencode "\$filter=start/dateTime lt '$CUTOFF_DATE' and contains(subject,'E5')" \
            --data-urlencode "\$select=id,subject" \
            -H "Authorization: Bearer $TOKEN")
          
          OLD_EVENT_IDS=$(echo "$OLD_EVENTS" | jq -r '.value[].id // empty' 2>/dev/null || echo "")
          EVENTS_DELETED=0
          
          for EVENT_ID in $OLD_EVENT_IDS; do
            if [ -n "$EVENT_ID" ] && [ "$EVENT_ID" != "null" ]; then
              curl -s -o /dev/null \
                -X DELETE "https://graph.microsoft.com/v1.0/users/${{ secrets.MS_GRAPH_USER_EMAIL }}/calendar/events/$EVENT_ID" \
                -H "Authorization: Bearer $TOKEN" || true
              EVENTS_DELETED=$((EVENTS_DELETED + 1))
            fi
          done
          echo "✅ Eventos antiguos eliminados: $EVENTS_DELETED"
          
          # 2. Limpiar tareas completadas en Planner (>14 días)
          echo "📋 Limpiando tareas completadas antiguas..."
          # Nota: Planner API no soporta filtro por fecha directamente,
          # se requiere lógica adicional si es necesario
          
          # 3. Limpiar listas To Do temporales (con sufijo de fecha)
          echo "📝 Limpiando listas To Do temporales..."
          TODO_URL="https://graph.microsoft.com/v1.0/users/${{ secrets.MS_GRAPH_USER_EMAIL }}/todo"
          
          TODO_LISTS=$(curl -s -X GET "$TODO_URL/lists" -H "Authorization: Bearer $TOKEN")
          
          # Solo eliminar listas que tengan formato de fecha (YYYYMMDD)
          TEMP_LIST_IDS=$(echo "$TODO_LISTS" | jq -r '.value[]? | select(.displayName | test("[0-9]{8}")) | .id // empty')
          LISTS_DELETED=0
          
          for LIST_ID in $TEMP_LIST_IDS; do
            if [ -n "$LIST_ID" ] && [ "$LIST_ID" != "null" ]; then
              curl -s -o /dev/null \
                -X DELETE "$TODO_URL/lists/$LIST_ID" \
                -H "Authorization: Bearer $TOKEN" || true
              LISTS_DELETED=$((LISTS_DELETED + 1))
            fi
          done
          echo "✅ Listas To Do temporales eliminadas: $LISTS_DELETED"
          
          # 4. NO eliminar: Grupo principal, Team, SharePoint, Documentación
          echo ""
          echo "🔒 Recursos preservados:"
          echo "   - Grupo E5-Dev-Project (proyecto continuo)"
          echo "   - Team y canales de desarrollo"
          echo "   - Documentación en SharePoint"
          echo "   - Plan de Planner con historial"
          echo ""
          echo "🧹 Limpieza selectiva completada"

      - name: 15. Crear Backlog de Proyecto en SharePoint (Estructura de Datos)
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
          GROUP_ID: ${{ steps.power_platform_activity.outputs.GROUP_ID }}
        run: |
          echo "📊 Creando estructura de base de datos de proyecto (SharePoint List)..."
          
          # Obtener el sitio del grupo creado en paso 14
          SITE_INFO=$(curl -s \
            -X GET "https://graph.microsoft.com/v1.0/groups/$GROUP_ID/sites/root" \
            -H "Authorization: Bearer $TOKEN")
          
          SITE_ID=$(echo "$SITE_INFO" | jq -r '.id')
          
          if [ -n "$SITE_ID" ] && [ "$SITE_ID" != "null" ]; then
            # Crear lista personalizada (simula gestión de requisitos/backlog)
            LIST_JSON=$(jq -n \
              --arg title "Product Backlog" \
              '{
                "displayName": $title,
                "columns": [
                  {
                    "name": "StoryPoints",
                    "number": {}
                  },
                  {
                    "name": "Priority",
                    "choice": {
                      "choices": ["Critical", "High", "Medium", "Low"],
                      "allowTextEntry": false
                    }
                  },
                  {
                    "name": "Sprint",
                    "text": {}
                  },
                  {
                    "name": "EstadoDesarrollo",
                    "choice": {
                      "choices": ["Backlog", "En Desarrollo", "Testing", "Done"],
                      "allowTextEntry": false
                    }
                  }
                ],
                "list": {
                  "template": "genericList"
                }
              }')
            
            CREATE_LIST=$(curl -s -w "\n%{http_code}" \
              -X POST "https://graph.microsoft.com/v1.0/sites/$SITE_ID/lists" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$LIST_JSON")
            
            if [ "$(echo "$CREATE_LIST" | tail -n1)" -eq 201 ]; then
              LIST_ID=$(echo "$CREATE_LIST" | sed '$d' | jq -r '.id')
              echo "✅ Lista Product Backlog creada: $LIST_ID"
              
              # Agregar items de ejemplo (simula gestión activa de requisitos)
              ITEMS=('{"fields":{"Title":"Integración API Power Platform","StoryPoints":8,"Priority":"High","Sprint":"Sprint 1","EstadoDesarrollo":"En Desarrollo"}}' '{"fields":{"Title":"Diseño UX Canvas App","StoryPoints":5,"Priority":"Medium","Sprint":"Sprint 1","EstadoDesarrollo":"Testing"}}' '{"fields":{"Title":"Configuración Dataverse","StoryPoints":13,"Priority":"Critical","Sprint":"Sprint 2","EstadoDesarrollo":"Backlog"}}')
              
              for item in "${ITEMS[@]}"; do
                curl -s -o /dev/null \
                  -X POST "https://graph.microsoft.com/v1.0/sites/$SITE_ID/lists/$LIST_ID/items" \
                  -H "Authorization: Bearer $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "$item"
              done
              echo "✅ 3 historias de usuario agregadas al backlog"
            fi
          fi

      - name: 16. Tareas Personales de Desarrollo (Microsoft To Do)
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
          USER_EMAIL: ${{ secrets.MS_GRAPH_USER_EMAIL }}
        run: |
          echo "📝 Creando lista de tareas personales de desarrollo..."
          
          # Usar endpoint /users/{email}/ para tokens de aplicación
          BASE_URL="https://graph.microsoft.com/v1.0/users/$USER_EMAIL"
          
          # Crear lista de tareas en To Do
          TODO_LIST=$(jq -n \
            --arg name "Dev Tasks $UNIQUE_SUFFIX" \
            '{"displayName": $name}')
          
          CREATE_TODO=$(curl -s -w "\n%{http_code}" \
            -X POST "$BASE_URL/todo/lists" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$TODO_LIST")
          
          if [ "$(echo "$CREATE_TODO" | tail -n1)" -eq 201 ]; then
            LIST_ID=$(echo "$CREATE_TODO" | sed '$d' | jq -r '.id')
            echo "✅ Lista To Do creada"
            
            # Crear tareas técnicas (demuestra planificación de desarrollo)
            TASKS=("Revisar pull requests del equipo" "Actualizar documentación técnica" "Optimizar queries de Dataverse" "Configurar CI/CD para solución Power Platform" "Code review: conectores personalizados")
            
            # Calcular fechas una sola vez
            DUE_DATE=$(date -u -d '+2 days' +%Y-%m-%dT%H:%M:%SZ)
            REMINDER_DATE=$(date -u -d '+1 day' +%Y-%m-%dT09:00:00Z)
            
            for task in "${TASKS[@]}"; do
              TASK_JSON=$(jq -n \
                --arg title "$task" \
                --arg dueDate "$DUE_DATE" \
                --arg reminderDate "$REMINDER_DATE" \
                '{
                  "title": $title,
                  "dueDateTime": {"dateTime": $dueDate, "timeZone": "UTC"},
                  "importance": "high",
                  "isReminderOn": true,
                  "reminderDateTime": {"dateTime": $reminderDate, "timeZone": "UTC"}
                }')
              
              curl -s -o /dev/null \
                -X POST "$BASE_URL/todo/lists/$LIST_ID/tasks" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "$TASK_JSON"
            done
            echo "✅ 5 tareas de desarrollo creadas con recordatorios"
          fi

      - name: 17. Documentación Técnica en OneDrive (Artefactos de Desarrollo)
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
          USER_EMAIL: ${{ secrets.MS_GRAPH_USER_EMAIL }}
        run: |
          echo "📁 Creando estructura de documentación técnica..."
          
          # Usar endpoint /users/{email}/ para tokens de aplicación
          DRIVE_URL="https://graph.microsoft.com/v1.0/users/$USER_EMAIL/drive"
          
          # Crear carpeta principal
          FOLDER_JSON=$(jq -n \
            --arg name "E5-Dev-Docs" \
            '{"name": $name, "folder": {}, "@microsoft.graph.conflictBehavior": "rename"}')
          
          CREATE_FOLDER=$(curl -s -w "\n%{http_code}" \
            -X POST "$DRIVE_URL/root/children" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$FOLDER_JSON")
          
          if [ "$(echo "$CREATE_FOLDER" | tail -n1)" -eq 201 ]; then
            FOLDER_ID=$(echo "$CREATE_FOLDER" | sed '$d' | jq -r '.id')
            echo "✅ Carpeta de proyecto creada en OneDrive"
            
            # Crear subcarpetas (estructura profesional de proyecto)
            for subfolder in "01-Requisitos" "02-Arquitectura" "03-Documentacion-API" "04-Testing" "05-Deploy"; do
              SUB_JSON=$(jq -n --arg name "$subfolder" '{"name": $name, "folder": {}}')
              curl -s -o /dev/null \
                -X POST "$DRIVE_URL/items/$FOLDER_ID/children" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "$SUB_JSON"
            done
            echo "✅ Estructura de carpetas creada"
            
            # Crear archivo de arquitectura técnica (usando echo -e para evitar problemas YAML)
            echo -e "# Arquitectura Power Platform - $UNIQUE_SUFFIX\n\n## Componentes Principales\n- Canvas Apps: Interfaz de usuario responsive\n- Dataverse: Modelo de datos entidad-relacion\n- Power Automate: Workflows de aprobacion e integracion\n- Azure Functions: Logica de negocio personalizada\n\n## Diagrama de Flujo\n1. Usuario -> Azure AD Auth\n2. API Gateway -> Power Platform\n3. Dataverse -> SQL Azure\n\n## Seguridad\n- RBAC implementado\n- DLP policies activas\n- Azure Key Vault para secrets\n\nFecha: $(date)\nVersion: 1.0.$UNIQUE_SUFFIX" > /tmp/arquitectura.md
            
            curl -s -o /dev/null \
              -X PUT "$DRIVE_URL/items/$FOLDER_ID:/02-Arquitectura/Arquitectura-Tecnica-$UNIQUE_SUFFIX.md:/content" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: text/markdown" \
              --upload-file /tmp/arquitectura.md
            echo "✅ Documento de arquitectura subido"
            
            # Crear archivo de especificación de API
            API_SPEC='{
              "openapi": "3.0.0",
              "info": {
                "title": "Power Platform Integration API",
                "version": "1.0.'$UNIQUE_SUFFIX'"
              },
              "paths": {
                "/webhooks/dataverse": {
                  "post": {
                    "summary": "Webhook para cambios en Dataverse",
                    "operationId": "webhookDataverse"
                  }
                }
              }
            }'
            echo "$API_SPEC" > /tmp/api-spec.json
            
            curl -s -o /dev/null \
              -X PUT "$DRIVE_URL/items/$FOLDER_ID:/03-Documentacion-API/OpenAPI-Spec-$UNIQUE_SUFFIX.json:/content" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              --upload-file /tmp/api-spec.json
            echo "✅ Especificación OpenAPI subida"
          fi

      - name: 18. Eventos Recurrentes de Desarrollo (Daily Standups)
        if: steps.set_vars.outputs.RUN_DAILY_STANDUPS == 'true'
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
          USER_EMAIL: ${{ secrets.MS_GRAPH_USER_EMAIL }}
        run: |
          echo "📅 Programando ceremonias ágiles (solo L-Mi)..."
          
          # Crear serie de eventos recurrentes (Daily Standups)
          START_DATE=$(date -u -d '+1 day' +%Y-%m-%dT09:00:00)
          
          EVENT_JSON=$(jq -n \
            --arg subject "Daily Standup - Sprint $UNIQUE_SUFFIX" \
            --arg start "$START_DATE" \
            '{
              "subject": $subject,
              "body": {
                "contentType": "HTML",
                "content": "<h3>Daily Standup - Desarrollo Power Platform</h3><p>Reunión diaria de sincronización del equipo:</p><ul><li>¿Qué hiciste ayer?</li><li>¿Qué harás hoy?</li><li>¿Hay algún impedimento?</li></ul>"
              },
              "start": {
                "dateTime": $start,
                "timeZone": "UTC"
              },
              "end": {
                "dateTime": "'$(date -u -d '+1 day 09:30:00' +%Y-%m-%dT%H:%M:%S)'",
                "timeZone": "UTC"
              },
              "recurrence": {
                "pattern": {
                  "type": "daily",
                  "interval": 1
                },
                "range": {
                  "type": "endDate",
                  "startDate": "'$(date -u -d '+1 day' +%Y-%m-%d)'",
                  "endDate": "'$(date -u -d '+14 days' +%Y-%m-%d)'"
                }
              },
              "isOnlineMeeting": true,
              "onlineMeetingProvider": "teamsForBusiness"
            }')
          
          curl -s -o /dev/null \
            -X POST "https://graph.microsoft.com/v1.0/users/$USER_EMAIL/calendar/events" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$EVENT_JSON"
          echo "✅ Serie de 14 Daily Standups creada (2 semanas)"
          
          # Crear evento de planning mensual
          PLANNING_JSON=$(jq -n \
            --arg subject "Sprint Planning - Monthly" \
            '{
              "subject": $subject,
              "body": {"content": "Planificación de features para el mes"},
              "start": {"dateTime": "'$(date -u -d '+3 days 14:00:00' +%Y-%m-%dT%H:%M:%S)'", "timeZone": "UTC"},
              "end": {"dateTime": "'$(date -u -d '+3 days 16:00:00' +%Y-%m-%dT%H:%M:%S)'", "timeZone": "UTC"},
              "recurrence": {
                "pattern": {"type": "relativeMonthly", "interval": 1, "daysOfWeek": ["Monday"], "index": "first"},
                "range": {"type": "noEnd", "startDate": "'$(date -u -d '+3 days' +%Y-%m-%d)'"}
              },
              "isOnlineMeeting": true,
              "onlineMeetingProvider": "teamsForBusiness"
            }')
          
          curl -s -o /dev/null \
            -X POST "https://graph.microsoft.com/v1.0/users/$USER_EMAIL/calendar/events" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PLANNING_JSON"
          echo "✅ Evento mensual de Sprint Planning recurrente creado"

      - name: 19. Wiki de Proyecto en SharePoint (Documentación Colaborativa)
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
          GROUP_ID: ${{ steps.power_platform_activity.outputs.GROUP_ID }}
        run: |
          echo "📄 Creando página wiki de documentación técnica..."
          
          # Obtener el sitio del grupo
          SITE_ID=$(curl -s \
            -X GET "https://graph.microsoft.com/v1.0/groups/$GROUP_ID/sites/root" \
            -H "Authorization: Bearer $TOKEN" | jq -r '.id')
          
          if [ -n "$SITE_ID" ] && [ "$SITE_ID" != "null" ]; then
            # Crear página de SharePoint (Site Page)
            PAGE_JSON=$(jq -n \
              --arg title "Wiki Técnico Proyecto" \
              '{
                "@odata.type": "#microsoft.graph.sitePage",
                "name": "Technical-Wiki.aspx",
                "title": $title,
                "pageLayout": "article",
                "showComments": true,
                "showRecommendedPages": true,
                "contentType": {
                  "name": "Site Page"
                }
              }')
            
            CREATE_PAGE=$(curl -s -w "\n%{http_code}" \
              -X POST "https://graph.microsoft.com/v1.0/sites/$SITE_ID/pages" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAGE_JSON")
            
            if [ "$(echo "$CREATE_PAGE" | tail -n1)" -eq 201 ]; then
              PAGE_ID=$(echo "$CREATE_PAGE" | sed '$d' | jq -r '.id')
              echo "✅ Página wiki creada en SharePoint"
              
              # Publicar la página
              curl -s -o /dev/null \
                -X POST "https://graph.microsoft.com/v1.0/sites/$SITE_ID/pages/$PAGE_ID/publish" \
                -H "Authorization: Bearer $TOKEN"
              echo "✅ Wiki publicada y disponible"
            fi
          fi

      - name: 20. Comunicación de Equipo (Email al Grupo + Webhook) [CORREGIDO]
        env:
          TOKEN: ${{ steps.get_token.outputs.TOKEN }}
          UNIQUE_SUFFIX: ${{ steps.set_vars.outputs.UNIQUE_SUFFIX }}
          GROUP_ID: ${{ steps.power_platform_activity.outputs.GROUP_ID }}
          USER_EMAIL: ${{ secrets.MS_GRAPH_USER_EMAIL }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          echo "💬 Enviando resumen de actividad al equipo..."
          USE_FALLBACK="true"
          CURRENT_DATE=$(date)
          
          # MÉTODO 1: Enviar email al grupo
          if [ -n "$GROUP_ID" ] && [ "$GROUP_ID" != "null" ]; then
            echo "📧 Obteniendo dirección del grupo..."
            
            GROUP_DATA=$(curl -s \
              -X GET "https://graph.microsoft.com/v1.0/groups/$GROUP_ID?\$select=mail" \
              -H "Authorization: Bearer $TOKEN")
            
            GROUP_EMAIL=$(echo "$GROUP_DATA" | jq -r '.mail // empty')
            
            if [ -n "$GROUP_EMAIL" ] && [ "$GROUP_EMAIL" != "null" ]; then
              echo "📬 Enviando email a: $GROUP_EMAIL"
              
              # Crear contenido HTML del email pasando variables correctamente
              EMAIL_JSON=$(jq -n \
                --arg to "$GROUP_EMAIL" \
                --arg subject "Pipeline E5 Completado - $UNIQUE_SUFFIX" \
                --arg suffix "$UNIQUE_SUFFIX" \
                --arg date "$CURRENT_DATE" \
                '{
                  "message": {
                    "subject": $subject,
                    "body": {
                      "contentType": "HTML",
                      "content": ("<h2>🚀 Pipeline de Desarrollo E5 Finalizado</h2><p><b>ID de Ejecución:</b> " + $suffix + "<br><b>Fecha:</b> " + $date + "</p><h3>Resumen de Actividades:</h3><ul><li>✅ <b>Grupo de Proyecto:</b> Creado con Team asociado</li><li>✅ <b>Planner:</b> Plan de desarrollo y 5 tareas creadas</li><li>✅ <b>SharePoint:</b> Backlog con historias de usuario</li><li>✅ <b>OneDrive:</b> Documentación técnica y specs API</li><li>✅ <b>Calendario:</b> 14 Daily standups + Planning</li><li>✅ <b>To Do:</b> Lista personal de tareas dev</li></ul><p><i>Generado automáticamente por GitHub Actions.</i></p>")
                    },
                    "toRecipients": [
                      {
                        "emailAddress": {
                          "address": $to
                        }
                      }
                    ]
                  }
                }')
              
              EMAIL_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST "https://graph.microsoft.com/v1.0/users/$USER_EMAIL/sendMail" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                -d "$EMAIL_JSON")
              
              if [ "$EMAIL_CODE" -eq 202 ]; then
                echo "✅ Email enviado al grupo: $GROUP_EMAIL"
                USE_FALLBACK="false"
              else
                echo "⚠️ Error enviando email (HTTP $EMAIL_CODE)"
              fi
            else
              echo "⚠️ El grupo no tiene email configurado"
            fi
          else
            echo "⚠️ No hay GROUP_ID disponible"
          fi
          
          # MÉTODO 2: Webhook de Teams
          if [ "$USE_FALLBACK" = "true" ]; then
            echo "📡 Enviando notificación via webhook..."
            
            WEBHOOK_JSON=$(jq -n \
              --arg suffix "$UNIQUE_SUFFIX" \
              '{
                "@type": "MessageCard",
                "@context": "http://schema.org/extensions",
                "themeColor": "28A745",
                "summary": "Pipeline E5 Completado",
                "sections": [{
                  "activityTitle": "🚀 Actividad de Desarrollo E5 Finalizada",
                  "activitySubtitle": "Todas las operaciones completadas",
                  "facts": [
                    {"name": "ID Ejecución", "value": $suffix},
                    {"name": "Estado", "value": "✅ Completado"}
                  ],
                  "markdown": true
                }]
              }')
            
            WH_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$TEAMS_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$WEBHOOK_JSON")
            
            if [ "$WH_CODE" -eq 200 ]; then
              echo "✅ Notificación enviada via Teams Webhook"
            else
              echo "⚠️ Webhook falló (HTTP $WH_CODE)"
            fi
          fi

      - name: 21. Registro Final y Commit
        if: always()
        run: |
          echo "Final de actividad de desarrollo: $(date)" >> activity.log
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add activity.log
          git diff --staged --quiet || git commit -m "Update activity log - $(date -u +%Y%m%d-%H%M%S)"
          git push || echo "⚠️ No se pudo hacer push (posiblemente no hay cambios)"
